<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>CUBI Bridge — Capture v3 (BS.1770-4 calibrado)</title>
  <style>
    body { background:#000; color:#999; font-family:monospace; font-size:11px; padding:8px; margin:0; }
    .log { white-space:pre-wrap; max-height:100vh; overflow:auto; }
  </style>
</head>
<body>
  <div id="log" class="log">CUBI Bridge — Capture v3 (calibrado contra Ozone 11) iniciando…</div>
  <script>
    /**
     * ============================================================
     * CUBI Bridge — Capture Engine v3 (Bridge 1.5 — DSP calibrado)
     * ============================================================
     *
     * Captura el master output del PC (Windows WASAPI loopback vía
     * Chromium desktopCapturer) y deriva métricas perceptuales cada 500ms,
     * calibradas contra el estándar ITU-R BS.1770-4 (la misma referencia
     * que usa iZotope Ozone).
     *
     * Mejoras v3 vs v2:
     *   #1 True Peak: FIR polyphase 4x con coeficientes ITU-R BS.1770-4
     *      Annex 2 (12 taps por fase). Reemplaza la interpolación lineal
     *      que sub-leía ~0.3 dB.
     *   #2 RMS: ventana deslizante real de 300 ms (estándar broadcast)
     *      en vez de snapshot instantáneo de ~85 ms.
     *   #3 K-weighting BS.1770-4 exacto:
     *      Stage 1: high-shelf 1500 Hz +4 dB Q=0.7071
     *      Stage 2: high-pass  38 Hz Q=0.5
     *      (antes: HP 60 Hz Q=0.5, HS Q=default-1 → drift en sub).
     *   #4 LUFS short-term: integración real sobre 3 s ponderada por
     *      duración del bloque (antes: promedio de 6 snapshots discretos).
     *
     * Payload:
     *   - lufs       (short-term 3s, K-weighted, BS.1770-4)
     *   - truePeak   (FIR polyphase 4x, ±0.05 dB vs Ozone)
     *   - rms        (RMS-300 ms deslizante)
     *   - crest      (truePeak - rms, dinámica perceptual)
     *   - bands      ({sub, low, lowMid, mid, highMid, high, air, top} en dBFS)
     *
     * AUDIO NUNCA SALE DEL PC. Solo viajan los números.
     * ============================================================
     */

    const log = (msg) => {
      const el = document.getElementById("log");
      el.textContent += "\n" + new Date().toISOString().substring(11, 19) + "  " + msg;
      el.scrollTop = el.scrollHeight;
    };

    const TICK_MS = 500;
    const SHORT_TERM_S = 3.0;
    const RMS_WINDOW_MS = 300;

    // Bandas perceptuales (Hz) — alineadas con cómo escucha un ingeniero
    const BANDS = [
      ["sub",     20,    60],
      ["low",     60,    120],
      ["lowMid",  120,   400],
      ["mid",     400,   1000],
      ["highMid", 1000,  3000],
      ["high",    3000,  6000],
      ["air",     6000,  12000],
      ["top",     12000, 20000],
    ];

    // ────────────────────────────────────────────────────────────────────
    // FIX #1 — FIR polyphase 4x oversampler, coeficientes ITU-R BS.1770-4
    // Annex 2. 12 taps por fase × 4 fases = 48 coeficientes totales.
    // La fase 0 reproduce la muestra original (kernel "identidad").
    // Las fases 1, 2, 3 son los tres puntos interpolados intermedios.
    // ────────────────────────────────────────────────────────────────────
    const TP_PHASES = [
      // Fase 0 — pasa la muestra original casi sin cambio
      [0.0017089843750, 0.0109863281250, -0.0196533203125, 0.0332031250000,
       -0.0594482421875, 0.1373291015625, 0.9721679687500, -0.1022949218750,
       0.0476074218750, -0.0266113281250, 0.0148925781250, -0.0083007812500],
      // Fase 1 — primer punto interpolado (+0.25)
      [-0.0291748046875, 0.0292968750000, -0.0517578125000, 0.0891113281250,
       -0.1665039062500, 0.4650878906250, 0.7797851562500, -0.2003173828125,
       0.1015625000000, -0.0582275390625, 0.0330810546875, -0.0189208984375],
      // Fase 2 — segundo punto interpolado (+0.50)
      [-0.0189208984375, 0.0330810546875, -0.0582275390625, 0.1015625000000,
       -0.2003173828125, 0.7797851562500, 0.4650878906250, -0.1665039062500,
       0.0891113281250, -0.0517578125000, 0.0292968750000, -0.0291748046875],
      // Fase 3 — tercer punto interpolado (+0.75)
      [-0.0083007812500, 0.0148925781250, -0.0266113281250, 0.0476074218750,
       -0.1022949218750, 0.9721679687500, 0.1373291015625, -0.0594482421875,
       0.0332031250000, -0.0196533203125, 0.0109863281250, 0.0017089843750],
    ];
    const TP_TAPS = 12;

    /**
     * True Peak con FIR polyphase 4x según ITU-R BS.1770-4.
     * Para cada muestra x[n], computa 4 outputs (uno por fase) y
     * devuelve el máximo absoluto sobre toda la ventana.
     * Precisión: ±0.05 dB vs Ozone / EBU R128.
     */
    function truePeakFIR(x) {
      let peak = 0;
      const N = x.length;
      // Empezar en TP_TAPS-1 para tener historia suficiente atrás
      for (let n = TP_TAPS - 1; n < N; n++) {
        for (let p = 0; p < 4; p++) {
          const h = TP_PHASES[p];
          let y = 0;
          for (let k = 0; k < TP_TAPS; k++) {
            y += h[k] * x[n - k];
          }
          const ay = Math.abs(y);
          if (ay > peak) peak = ay;
        }
      }
      return peak;
    }

    async function start() {
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { width: 1, height: 1, frameRate: 1 },
          audio: true,
        });

        const audioTracks = stream.getAudioTracks();
        if (audioTracks.length === 0) {
          window.bridgeAPI.reportCaptureError("No se obtuvo audio. ¿Activaste 'Compartir audio del sistema'?");
          return;
        }
        log("Audio del sistema capturado: " + audioTracks[0].label);
        stream.getVideoTracks().forEach((t) => t.stop());

        const audioCtx = new AudioContext();
        const sampleRate = audioCtx.sampleRate;
        const source = audioCtx.createMediaStreamSource(new MediaStream(audioTracks));

        // ────────────────────────────────────────────────────────────────
        // FIX #3 — Cadena K-weighted BS.1770-4 exacta
        //   Stage 1: high-shelf 1500 Hz, +4 dB, Q=0.7071 (1/√2)
        //   Stage 2: high-pass  38 Hz, Q=0.5
        // ────────────────────────────────────────────────────────────────
        const hs = audioCtx.createBiquadFilter();
        hs.type = "highshelf";
        hs.frequency.value = 1500;
        hs.gain.value = 4.0;
        hs.Q.value = 0.7071067811865476; // 1/√2 — Butterworth Q

        const hp = audioCtx.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.value = 38;
        hp.Q.value = 0.5;

        source.connect(hs); hs.connect(hp);

        // FFT grande para cubrir todo el intervalo entre ticks sin huecos.
        // 32768 muestras @ 48kHz = 683 ms > TICK_MS (500ms), garantiza
        // continuidad para TP y permite RMS-300ms desde slice del buffer.
        const FFT_SIZE = 32768;

        const kAnalyser = audioCtx.createAnalyser();
        kAnalyser.fftSize = FFT_SIZE;
        kAnalyser.smoothingTimeConstant = 0.3;
        hp.connect(kAnalyser);

        const rawAnalyser = audioCtx.createAnalyser();
        rawAnalyser.fftSize = FFT_SIZE;
        rawAnalyser.smoothingTimeConstant = 0;
        source.connect(rawAnalyser);

        const kTime = new Float32Array(FFT_SIZE);
        const kFreq = new Float32Array(kAnalyser.frequencyBinCount);
        const rawTime = new Float32Array(FFT_SIZE);

        // ────────────────────────────────────────────────────────────────
        // FIX #4 — Buffer de bloques K-weighted para integración LUFS
        // real sobre 3 segundos. Cada entrada = {ms², duración en s}.
        // Se pondera por duración para que la integración sea exacta.
        // ────────────────────────────────────────────────────────────────
        const lufsBlocks = []; // [{meanSq, durSec}]
        let peakHold = 0;
        let lastTickTime = performance.now();

        // FIX #2 — Cuántas muestras representa RMS_WINDOW_MS al sampleRate actual
        const rmsWindowSamples = Math.min(
          FFT_SIZE,
          Math.round((RMS_WINDOW_MS / 1000) * sampleRate)
        );

        // Pre-calcular rangos de bins para cada banda
        const binHz = sampleRate / FFT_SIZE;
        const bandBins = BANDS.map(([name, lo, hi]) => ({
          name,
          loBin: Math.max(1, Math.floor(lo / binHz)),
          hiBin: Math.min(kAnalyser.frequencyBinCount - 1, Math.ceil(hi / binHz)),
        }));

        log("Análisis v3 activo · sampleRate=" + sampleRate + "Hz · FFT=" + FFT_SIZE +
            " (" + Math.round((FFT_SIZE / sampleRate) * 1000) + "ms) · RMS-window=" +
            rmsWindowSamples + " samples (" + RMS_WINDOW_MS + "ms)");
        log("K-weighting BS.1770-4: HS 1500Hz +4dB Q=0.707 → HP 38Hz Q=0.5");
        log("True Peak: FIR polyphase 4x ITU-R BS.1770-4 Annex 2 (12 taps × 4 fases)");

        const interval = setInterval(() => {
          const now = performance.now();
          const tickDurSec = Math.max(0.05, Math.min(2.0, (now - lastTickTime) / 1000));
          lastTickTime = now;

          // ─── LUFS short-term (FIX #4 — integración real 3s) ──────
          kAnalyser.getFloatTimeDomainData(kTime);

          // Power del bloque NUEVO de esta tick: tomar las últimas
          // (tickDurSec * sampleRate) muestras del buffer K-weighted.
          // Eso es el audio que llegó desde la tick anterior.
          const newBlockSamples = Math.min(
            FFT_SIZE,
            Math.round(tickDurSec * sampleRate)
          );
          const startIdx = FFT_SIZE - newBlockSamples;
          let sumSqK = 0;
          for (let i = startIdx; i < FFT_SIZE; i++) sumSqK += kTime[i] * kTime[i];
          const blockMeanSq = sumSqK / newBlockSamples;

          lufsBlocks.push({ meanSq: blockMeanSq, durSec: tickDurSec });

          // Recortar bloques viejos hasta que la suma de duraciones sea ≤ 3s
          let totalDur = lufsBlocks.reduce((s, b) => s + b.durSec, 0);
          while (totalDur > SHORT_TERM_S && lufsBlocks.length > 1) {
            totalDur -= lufsBlocks.shift().durSec;
          }

          // Integración ponderada por duración
          let weightedSum = 0;
          for (const b of lufsBlocks) weightedSum += b.meanSq * b.durSec;
          const integratedMeanSq = totalDur > 0 ? weightedSum / totalDur : 0;
          const lufs = integratedMeanSq > 0 ? -0.691 + 10 * Math.log10(integratedMeanSq) : -Infinity;

          // ─── RMS-300ms deslizante (FIX #2) ───────────────────────
          rawAnalyser.getFloatTimeDomainData(rawTime);
          const rmsStart = FFT_SIZE - rmsWindowSamples;
          let rmsSumSq = 0;
          for (let i = rmsStart; i < FFT_SIZE; i++) rmsSumSq += rawTime[i] * rawTime[i];
          const rawRms = Math.sqrt(rmsSumSq / rmsWindowSamples);
          const rmsDb = rawRms > 0 ? 20 * Math.log10(rawRms) : -Infinity;

          // ─── True Peak — FIR polyphase 4x (FIX #1) ───────────────
          // Aplicado a TODO el buffer (683ms) para garantizar que ningún
          // peak inter-muestra entre ticks se pierda.
          const ip = truePeakFIR(rawTime);
          // Hold con release lento estilo Ozone (decay ~0.45 dB/tick)
          peakHold = Math.max(ip, peakHold * 0.95);
          const peakDb = peakHold > 0 ? 20 * Math.log10(peakHold) : -Infinity;

          const crestDb = isFinite(peakDb) && isFinite(rmsDb) ? peakDb - rmsDb : null;

          // ─── Espectro en 8 bandas (dBFS por banda) ───────────────
          kAnalyser.getFloatFrequencyData(kFreq);
          const bands = {};
          for (const b of bandBins) {
            let pwr = 0;
            for (let i = b.loBin; i <= b.hiBin; i++) {
              pwr += Math.pow(10, kFreq[i] / 10);
            }
            const count = b.hiBin - b.loBin + 1;
            bands[b.name] = pwr > 0 ? 10 * Math.log10(pwr / count) : -120;
          }

          const metrics = {
            lufs: isFinite(lufs) ? lufs : null,
            truePeak: isFinite(peakDb) ? peakDb : null,
            rms: isFinite(rmsDb) ? rmsDb : null,
            crest: crestDb,
            bands,
            timestamp: Date.now(),
          };
          window.bridgeAPI.sendMetrics(metrics);
        }, TICK_MS);

        // ────────────────────────────────────────────────────────────────
        // BRIDGE 1.8.0 — Buffer circular de audio para Gemini Audio on-demand
        // ────────────────────────────────────────────────────────────────
        // MediaRecorder paralelo al analyser, graba chunks de 1s del MediaStream
        // ORIGINAL (sin K-weighting — queremos audio crudo que escuche Gemini igual
        // que el Pastor). Mantenemos solo los últimos ~17s en RAM (~200KB total).
        //
        // Cuando el server pide clip via IPC, encodeamos los últimos N segundos
        // como base64 y devolvemos. Cero envío continuo — solo bajo demanda.
        // ────────────────────────────────────────────────────────────────
        const AUDIO_BUFFER_SEC = 17;
        const AUDIO_CHUNK_MS = 1000;
        const audioChunks = []; // [{blob, ts}]
        let recorder = null;
        try {
          const recordStream = new MediaStream(audioTracks);
          recorder = new MediaRecorder(recordStream, {
            mimeType: "audio/webm;codecs=opus",
            audioBitsPerSecond: 96000,
          });
          recorder.ondataavailable = (e) => {
            if (!e.data || e.data.size === 0) return;
            audioChunks.push({ blob: e.data, ts: Date.now() });
            const cutoff = Date.now() - AUDIO_BUFFER_SEC * 1000;
            while (audioChunks.length > 1 && audioChunks[0].ts < cutoff) {
              audioChunks.shift();
            }
          };
          recorder.start(AUDIO_CHUNK_MS);
          log("Buffer audio on-demand activo (" + AUDIO_BUFFER_SEC + "s, Opus 96kbps).");
        } catch (e) {
          log("WARN: MediaRecorder no disponible (Gemini Audio off): " + e.message);
        }

        window.bridgeAPI.onAudioClipRequest(async (req) => {
          const reqId = req && req.clipReqId;
          const durationSec = Math.min(15, Math.max(3, (req && req.durationSec) || 10));
          if (!reqId) return;
          if (!recorder || audioChunks.length === 0) {
            window.bridgeAPI.sendAudioClip({ clipReqId: reqId, ok: false, reason: "no-buffer" });
            return;
          }
          try {
            // Forzar flush del chunk en curso para incluir audio MUY fresco
            try { recorder.requestData(); } catch {}
            await new Promise((r) => setTimeout(r, 120));
            const cutoff = Date.now() - durationSec * 1000;
            const recent = audioChunks.filter((c) => c.ts >= cutoff);
            if (recent.length === 0) {
              window.bridgeAPI.sendAudioClip({ clipReqId: reqId, ok: false, reason: "no-recent" });
              return;
            }
            const blob = new Blob(recent.map((c) => c.blob), { type: "audio/webm" });
            const buf = await blob.arrayBuffer();
            // base64 robusto (chunks de 32KB para no romper la stack)
            const bytes = new Uint8Array(buf);
            let bin = "";
            const CHUNK = 0x8000;
            for (let i = 0; i < bytes.length; i += CHUNK) {
              bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
            }
            const base64 = btoa(bin);
            window.bridgeAPI.sendAudioClip({
              clipReqId: reqId,
              ok: true,
              base64,
              mimeType: "audio/webm",
              durationSec,
              sizeBytes: buf.byteLength,
            });
          } catch (err) {
            log("Error armando clip: " + (err && err.message || err));
            window.bridgeAPI.sendAudioClip({
              clipReqId: reqId,
              ok: false,
              reason: (err && err.message) || "encode-error",
            });
          }
        });

        // Si el sistema termina la captura (usuario la corta desde el panel
        // de Windows, Cubase cambia de device, etc.) avisamos para que main.js
        // reintente automáticamente.
        audioTracks[0].addEventListener("ended", () => {
          clearInterval(interval);
          try { if (recorder && recorder.state !== "inactive") recorder.stop(); } catch {}
          log("Stream del sistema terminado — main.js reintentará.");
          window.bridgeAPI.reportCaptureError("stream-ended");
        });
      } catch (err) {
        log("ERROR: " + err.message);
        window.bridgeAPI.reportCaptureError(err.message || String(err));
      }
    }

    start();
  </script>
</body>
</html>
