<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>CUBI Bridge — Emparejar estudio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0508;
      color: #e5d8c0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1 {
      color: #D4AF37;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    p {
      font-size: 13px;
      color: #a09080;
      line-height: 1.5;
    }
    .code-input {
      width: 100%;
      padding: 16px;
      font-size: 28px;
      font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.4em;
      background: #15090d;
      color: #D4AF37;
      border: 2px solid #3a2a30;
      border-radius: 6px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }
    .code-input:focus { border-color: #D4AF37; }
    .code-input.error { border-color: #ef4444; color: #ef4444; }
    button {
      padding: 12px 20px;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      min-height: 30px;
    }
    .status.ok { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .status.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .status.info { background: rgba(212, 175, 55, 0.1); color: #D4AF37; }
    .footer {
      font-size: 11px;
      color: #6a5a50;
      text-align: center;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <h1>🌉 Emparejar Estudio</h1>
  <p>
    Abre <strong style="color:#D4AF37">apocalipsisconcafe.com/lab</strong> en tu navegador,
    pulsa <strong>"Conectar mi Estudio"</strong> y pega aquí el código de 6 caracteres que aparezca.
  </p>
  <input type="text" id="code" class="code-input" maxlength="6" placeholder="------" autocomplete="off" />
  <button id="redeem">Emparejar</button>
  <div id="status" class="status"></div>
  <div class="footer">
    READ-ONLY · El audio nunca sale de tu PC · CUBI Records
  </div>

  <script>
    const input = document.getElementById("code");
    const btn = document.getElementById("redeem");
    const status = document.getElementById("status");

    input.focus();
    input.addEventListener("input", () => {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      input.classList.remove("error");
    });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") btn.click(); });

    btn.addEventListener("click", async () => {
      const code = input.value.trim();
      if (code.length !== 6) {
        status.className = "status error";
        status.textContent = "El código debe tener exactamente 6 caracteres";
        input.classList.add("error");
        return;
      }
      btn.disabled = true;
      status.className = "status info";
      status.textContent = "Emparejando…";
      const result = await window.bridgeAPI.redeem(code);
      if (result.ok) {
        status.className = "status ok";
        status.textContent = "✓ ¡Estudio conectado! Puedes cerrar esta ventana.";
        setTimeout(() => window.close(), 2000);
      } else {
        status.className = "status error";
        status.textContent = "✗ " + (result.error || "Error al emparejar");
        input.classList.add("error");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
